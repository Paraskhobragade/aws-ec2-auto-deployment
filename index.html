<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hakuna Matata Style UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Trebuchet MS',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
        to bottom,
        #ffb347,
        #ffcc70,
        #ffeaa7
    );
    overflow:hidden;
}

.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

/* Sun */
.sun{
    width:180px;
    height:180px;
    background:#ff7b00;
    border-radius:50%;
    position:absolute;
    top:80px;
    right:150px;
    box-shadow:0 0 60px #ff7b00;
}

/* Hills */
.hill1{
    position:absolute;
    bottom:-100px;
    width:120%;
    height:350px;
    background:#5d9c59;
    border-radius:50%;
}

.hill2{
    position:absolute;
    bottom:-140px;
    width:100%;
    height:280px;
    background:#3d8361;
    border-radius:50%;
}

/* Card */
.card{
    width:700px;
    background:white;
    padding:50px;
    border-radius:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
    z-index:2;
}

.logo{
    font-size:42px;
}

h1{
    font-size:58px;
    color:#5a3d2b;
    margin:20px 0;
}

p{
    font-size:20px;
    color:#666;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:30px;
    background:#ff7b00;
    color:white;
    text-decoration:none;
    padding:16px 40px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.08);
}

.animals{
    margin-top:25px;
    font-size:40px;
}
</style>
</head>
<body>

<div class="hero">

    <div class="sun"></div>

    <div class="card">
        <div class="logo">Childhood LOVE🦁Hakuna Matata</div>

        <h1>owned by: Paras .C. Khobragade!</h1>

        <p>
            Explore the wild adventures of the savanna.
            Enjoy a playful cartoon-inspired experience
            filled with sunshine, animals and fun.
        </p>

        <div class="animals">
            🦁 🐗 🦝 🦒 🐘
        </div>

        <a href="#" class="btn">Start Adventure</a>
    </div>

    <div class="hill1"></div>
    <div class="hill2"></div>

</div>

</body>
</html>
